<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KWETU CLOUD CONTROL V4</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --bg: #f4f7f6; --card: #fff; --txt: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--txt); padding-bottom: 85px; }
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { padding: 15px; border-radius: 10px; color: white; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--s); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #ddd; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 12px; text-align: center; font-size: 10px; color: gray; cursor: pointer; }
        .active { color: var(--s); font-weight: bold; border-top: 3px solid var(--s); }
        .hidden { display: none !important; }
        .sync-info { font-size: 10px; text-align: center; color: var(--s); margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pg-login" class="container">
        <div class="card" style="margin-top: 60px; text-align: center;">
            <h1 style="color: var(--s); margin-bottom:5px;">KWETU PAZURI</h1>
            <p style="margin-top:0; color:gray;">SYSTEME CLOUD CENTRALISÉ</p>
            <div id="login-status" style="font-size:12px; color:var(--d); margin-bottom:10px;"></div>
            <input type="text" id="login-u" placeholder="Utilisateur">
            <input type="password" id="login-p" placeholder="Mot de passe">
            <button onclick="login()">SE CONNECTER</button>
            <p style="font-size:10px; color:gray; margin-top:20px;">POWERED BY BIG BROTHER TECH</p>
        </div>
    </div>

    <div id="pg-app" class="hidden">
        <div class="header">
            <span id="user-display">👤 Chargement...</span>
            <button onclick="syncGlobal()" style="width:auto; padding:5px 10px; font-size:10px; background:#34495e">🔄 SYNC</button>
        </div>

        <div class="container">
            <div id="tab-dash" class="tab-content">
                <div class="sync-info" id="sync-status">Synchro Cloud...</div>
                <div class="dash-grid">
                    <div class="stat-box" style="background:var(--s)"><small>Entrées</small><br><strong id="total-r">0</strong></div>
                    <div class="stat-box" style="background:var(--d)"><small>Sorties</small><br><strong id="total-d">0</strong></div>
                </div>
                <div class="card" style="text-align: center; margin-top:10px;">
                    <small>SOLDE CLOUD (CDF)</small>
                    <h2 id="total-solde" style="color:var(--s); font-size:30px;">0</h2>
                </div>
                <h4>Historique Partagé</h4>
                <div id="history-list"></div>
            </div>

            <div id="tab-saisie" class="tab-content hidden">
                <div class="card">
                    <h3>Nouvelle Opération</h3>
                    <select id="t-type"><option value="revenu">Revenu (+)</option><option value="depense">Dépense (-)</option></select>
                    <input type="number" id="t-montant" placeholder="Montant CDF" inputmode="numeric">
                    <input type="text" id="t-motif" placeholder="Motif / Détails">
                    <button id="btn-send" onclick="envoiCloud()">ENVOYER AU CLOUD</button>
                </div>
            </div>

            <div id="tab-users" class="tab-content hidden">
                <div class="card">
                    <h3>👥 Créer un Compte Agent</h3>
                    <input type="text" id="add-u" placeholder="Nom de l'agent">
                    <input type="text" id="add-p" placeholder="Mot de passe">
                    <select id="add-r">
                        <option value="Caissier">Caissier</option>
                        <option value="Agent">Agent</option>
                        <option value="Photographe">Photographe</option>
                    </select>
                    <button onclick="ajouterAgent()" style="background:#34495e">LIER L'AGENT AU SERVEUR</button>
                </div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" id="n-dash" onclick="show('tab-dash', 'n-dash')">🏠<br>Dash</div>
            <div class="nav-item" id="n-saisie" onclick="show('tab-saisie', 'n-saisie')">➕<br>Saisie</div>
            <div id="nav-admin" class="nav-item hidden" onclick="show('tab-users', 'n-admin')">👥<br>Agents</div>
            <div class="nav-item" onclick="logout()" style="color:var(--d)">❌<br>Sortir</div>
        </div>
    </div>

    <script>
const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyQvyqT-gedo0vu2SSnuwPjVGVAmz_XjJJ-0zCT4dKzzM5M5cMmO1NnLmHalBahY3iQTQ/exec";


        // 1. SYNCHRONISATION TOTALE
        async function syncGlobal() {
            try {
                const res = await fetch(CLOUD_URL);
                db_cloud = await res.json();
                document.getElementById('sync-status').innerText = "✅ Cloud Synchro : " + new Date().toLocaleTimeString();
                if(user) updateUI();
            } catch(e) {
                document.getElementById('sync-status').innerText = "❌ Erreur de Liaison";
            }
        }

        // 2. CONNEXION
        function login() {
            const u = document.getElementById('login-u').value.toLowerCase().trim();
            const p = document.getElementById('login-p').value.trim();
            
            // Secours Admin Local
            if (u === "admin" && p === "admin123") {
                enterApp({name: "admin", r: "admin"});
                return;
            }

            if(db_cloud.users[u] && db_cloud.users[u].p === p) {
                enterApp({ name: u, ...db_cloud.users[u] });
            } else { 
                alert("Utilisateur non reconnu sur le serveur.");
            }
        }

        function enterApp(userData) {
            user = userData;
            document.getElementById('pg-login').classList.add('hidden');
            document.getElementById('pg-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = "👤 " + user.name.toUpperCase();
            if(user.r === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
            updateUI();
        }

        // 3. ENVOI TRANSACTION
        async function envoiCloud() {
            const m = document.getElementById('t-montant').value;
            const mot = document.getElementById('t-motif').value;
            const typ = document.getElementById('t-type').value;
            if(!m || !mot) return alert("Complétez les champs !");

            document.getElementById('btn-send').innerText = "⏳ Envoi...";
            await fetch(CLOUD_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({ action: "log", user: user.name, type: typ, montant: m, motif: mot, branch: user.r }) 
            });
            
            document.getElementById('t-montant').value = "";
            document.getElementById('t-motif').value = "";
            document.getElementById('btn-send').innerText = "ENVOYER AU CLOUD";
            alert("✅ Données enregistrées dans Google Sheets !");
            syncGlobal();
            show('tab-dash', 'n-dash');
        }

        // 4. CREATION AGENT
        async function ajouterAgent() {
            const n = document.getElementById('add-u').value.toLowerCase().trim();
            const p = document.getElementById('add-p').value.trim();
            const b = document.getElementById('add-r').value;
            if(!n || !p) return alert("Veuillez remplir les infos !");

            await fetch(CLOUD_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({ action: "addUser", u: n, p: p, r: "user", b: b }) 
            });
            
            alert("✅ Agent créé sur le Cloud !");
            document.getElementById('add-u').value = "";
            document.getElementById('add-p').value = "";
            syncGlobal();
        }

        function updateUI() {
            let r=0, d=0;
            let list = db_cloud.logs || [];
            
            // L'agent ne voit que son travail, l'admin voit tout
            if(user && user.r !== 'admin') {
                list = list.filter(l => l.u === user.name);
            }
            
            list.forEach(l => { 
                if(l.t === 'revenu') r += parseFloat(l.m); 
                else d += parseFloat(l.m); 
            });

            document.getElementById('total-solde').innerText = (r-d).toLocaleString() + " CDF";
            document.getElementById('total-r').innerText = r.toLocaleString();
            document.getElementById('total-d').innerText = d.toLocaleString();
            
            document.getElementById('history-list').innerHTML = list.slice(0,25).map(l => `
                <div style="border-bottom:1px solid #eee; padding:10px 0; font-size:12px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span><b>${l.u.toUpperCase()}</b>: ${l.t==='revenu'?'➕':'➖'} ${parseFloat(l.m).toLocaleString()}</span>
                        <small style="color:gray">${new Date(l.d).toLocaleDateString()}</small>
                    </div>
                    <div style="color:gray; font-size:11px;">${l.mot}</div>
                </div>`).join('') || "<p style='text-align:center; color:gray;'>Aucune donnée trouvée.</p>";
        }

        function show(tabId, navId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(navId).classList.add('active');
        }

        function logout() { if(confirm("Se déconnecter ?")) location.reload(); }
        
        window.onload = syncGlobal;
    </script>
</body>
</html>
